name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 1.1.1，会自动补 v 前缀)'
        type: string
        required: true
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Resolve version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ inputs.version }}"
          } else {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          }
          $tag = "v$ver"
          Write-Host "Version: $ver"
          Write-Host "Tag:     $tag"
          echo "ver=$ver" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'setup.py'

      - name: Install PyTorch 2.7.1 + CUDA 12.8
        run: |
          pip install torch==2.7.1 `
            --index-url https://download.pytorch.org/whl/cu128

      - name: Install application dependencies
        run: |
          pip install librosa==0.9.2 piano_transcription_inference pyinstaller

      - name: Verify PyTorch installation
        run: |
          python -c "import torch; print(f'PyTorch {torch.__version__}'); print(f'CUDA: {torch.version.cuda}')"

      - name: Prepare build directory
        run: |
          New-Item -ItemType Directory -Force build
          Copy-Item PianoTrans.py build\
          Copy-Item windows\PianoTrans.spec build\

      - name: Build with PyInstaller
        run: |
          Push-Location build
          pyinstaller --noconfirm PianoTrans.spec
          Pop-Location

      - name: Download model checkpoint
        run: |
          $dest = "build\dist\PianoTrans\piano_transcription_inference_data"
          New-Item -ItemType Directory -Force $dest
          $url = "https://zenodo.org/record/4034264/files/CRNN_note_F1%3D0.9677_pedal_F1%3D0.9186.pth?download=1"
          Invoke-WebRequest -Uri $url -OutFile "$dest\note_F1=0.9677_pedal_F1=0.9186.pth"

      - name: Download FFmpeg
        run: |
          $ffmpegDir = "build\dist\PianoTrans\ffmpeg"
          New-Item -ItemType Directory -Force $ffmpegDir
          $zipUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ffmpegExe = Get-ChildItem ffmpeg_extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if ($ffmpegExe) {
            Copy-Item $ffmpegExe.FullName $ffmpegDir\
          } else {
            Write-Error "ffmpeg.exe not found in archive"
            exit 1
          }
          Remove-Item -Recurse -Force ffmpeg_extract, ffmpeg.zip -ErrorAction SilentlyContinue

      - name: Download context menu launcher
        run: |
          Invoke-WebRequest -Uri "https://github.com/zenden2k/context-menu-launcher/releases/download/1.0/singleinstance.exe" `
            -OutFile "build\dist\PianoTrans\singleinstance.exe"

      - name: Copy supporting files
        run: |
          $pkgDir = "build\dist\PianoTrans"
          New-Item -ItemType Directory -Force "$pkgDir\reg"
          Copy-Item README.md "$pkgDir\README.txt"
          Copy-Item README_CN.md "$pkgDir\README_CN.txt"
          Copy-Item windows\PianoTrans-CPU.bat $pkgDir\
          Copy-Item windows\RightClickMenuRegister.bat $pkgDir\
          Copy-Item windows\RightClickMenuUnregister.bat $pkgDir\
          Copy-Item windows\RightClickMenuRegister.reg.in "$pkgDir\reg\"
          Copy-Item windows\RightClickMenuUnregister.reg "$pkgDir\reg\"

      - name: Size breakdown (before cleanup)
        run: |
          Write-Host "=== Size by top-level folders ==="
          Get-ChildItem build\dist\PianoTrans\ -Directory | ForEach-Object {
            $size = (Get-ChildItem $_.FullName -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
            $sizeMB = [math]::Round($size / 1MB, 1)
            Write-Host "  $($_.Name): $sizeMB MB"
          }
          $total = (Get-ChildItem build\dist\PianoTrans -Recurse -File | Measure-Object -Property Length -Sum).Sum
          Write-Host "  TOTAL: $([math]::Round($total / 1MB, 1)) MB"

      - name: Remove unnecessary CUDA DLLs
        run: |
          $pkgDir = "build\dist\PianoTrans"
          # These CUDA libraries are NOT needed for inference with this model:
          #   curand     — random number generation (training only)
          #   cusolverMg — multi-GPU linear algebra solver
          #   cusparse   — sparse matrix operations (not used by CRNN model)
          #   cusparseLt — sparse matrix operations (light variant)
          #   nccl       — multi-GPU / distributed communication
          #   nvJitLink  — CUDA JIT linker (only needed for Ahead-of-Time compilation)
          #   nvrtc-builtins — NVRTC built-in headers (runtime compilation support)
          #   nvToolsExt — NVIDIA profiling tools
          $patterns = @(
            '*curand*',
            '*cusolverMg*',
            '*cusparse*',
            '*cusparseLt*',
            '*nccl*',
            '*nvJitLink*',
            '*nvrtc-builtins*',
            '*nvToolsExt*'
          )
          $removed = 0
          foreach ($pattern in $patterns) {
            $files = Get-ChildItem $pkgDir -Recurse -Filter $pattern -File -ErrorAction SilentlyContinue
            foreach ($file in $files) {
              $removed += $file.Length
              Write-Host "Remove: $($file.Name) ($([math]::Round($file.Length / 1MB, 1)) MB)"
              Remove-Item $file.FullName -Force
            }
          }
          Write-Host "Freed: $([math]::Round($removed / 1MB, 1)) MB"

      - name: Size breakdown (after cleanup)
        run: |
          Write-Host "=== Size after cleanup ==="
          Get-ChildItem build\dist\PianoTrans\ -Directory | ForEach-Object {
            $size = (Get-ChildItem $_.FullName -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
            $sizeMB = [math]::Round($size / 1MB, 1)
            Write-Host "  $($_.Name): $sizeMB MB"
          }
          $total = (Get-ChildItem build\dist\PianoTrans -Recurse -File | Measure-Object -Property Length -Sum).Sum
          Write-Host "  TOTAL: $([math]::Round($total / 1MB, 1)) MB ($([math]::Round($total / 1GB, 2)) GB)"

      - name: Package as 7z
        run: |
          choco install 7zip -y --no-progress
          $7z = "C:\Program Files\7-Zip\7z.exe"
          if (-not (Test-Path $7z)) {
            $7z = (Get-Command 7z.exe -ErrorAction Stop).Source
          }
          $archive = "PianoTrans-v${{ steps.version.outputs.ver }}.7z"
          Write-Host "Creating $archive ..."
          Push-Location build\dist
          & $7z a -mx=9 "..\..\$archive" PianoTrans
          Pop-Location
          $size = (Get-Item $archive).Length
          $sizeMB = [math]::Round($size / 1MB, 1)
          Write-Host "Archive size: $sizeMB MB"
          echo "archive=$archive" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.archive }}
