name: Build Windows Package

on:
  workflow_dispatch:
    inputs:
      pytorch_version:
        description: 'PyTorch version'
        type: string
        default: '2.7.1'
      upload_artifact:
        description: 'Upload build artifact'
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install PyTorch ${{ inputs.pytorch_version || '2.7.1' }} + CUDA 12.8
        run: |
          pip install torch==${{ inputs.pytorch_version || '2.7.1' }} `
            --index-url https://download.pytorch.org/whl/cu128

      - name: Install application dependencies
        run: |
          pip install librosa==0.9.2 piano_transcription_inference pyinstaller

      - name: Verify PyTorch installation
        run: |
          python -c "import torch; print(f'PyTorch {torch.__version__}'); print(f'CUDA available: {torch.cuda.is_available()}'); print(f'CUDA version: {torch.version.cuda}')"

      - name: Prepare build directory
        run: |
          New-Item -ItemType Directory -Force build
          Copy-Item PianoTrans.py build\
          Copy-Item windows\PianoTrans.spec build\

      - name: Build with PyInstaller
        run: |
          Push-Location build
          pyinstaller --noconfirm PianoTrans.spec
          Pop-Location
          Write-Host "PyInstaller output:"
          Get-ChildItem build\dist\PianoTrans\ -Recurse | Select-Object -First 20

      - name: Download model checkpoint
        run: |
          $dest = "build\dist\PianoTrans\piano_transcription_inference_data"
          New-Item -ItemType Directory -Force $dest
          $url = "https://zenodo.org/record/4034264/files/CRNN_note_F1%3D0.9677_pedal_F1%3D0.9186.pth?download=1"
          $out = "$dest\note_F1=0.9677_pedal_F1=0.9186.pth"
          Write-Host "Downloading checkpoint..."
          Invoke-WebRequest -Uri $url -OutFile $out
          Write-Host "Checkpoint size: $((Get-Item $out).Length) bytes"

      - name: Download FFmpeg
        run: |
          $ffmpegDir = "build\dist\PianoTrans\ffmpeg"
          New-Item -ItemType Directory -Force $ffmpegDir
          $zipUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          $zipFile = "ffmpeg.zip"
          Write-Host "Downloading FFmpeg..."
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipFile
          Expand-Archive -Path $zipFile -DestinationPath ffmpeg_extract -Force
          $ffmpegExe = Get-ChildItem ffmpeg_extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if ($ffmpegExe) {
            Copy-Item $ffmpegExe.FullName $ffmpegDir\
            Write-Host "FFmpeg copied: $($ffmpegExe.FullName)"
          } else {
            Write-Warning "ffmpeg.exe not found in archive"
          }
          Remove-Item -Recurse -Force ffmpeg_extract, $zipFile -ErrorAction SilentlyContinue

      - name: Download context menu launcher
        run: |
          $url = "https://github.com/zenden2k/context-menu-launcher/releases/download/1.0/singleinstance.exe"
          Invoke-WebRequest -Uri $url -OutFile "build\dist\PianoTrans\singleinstance.exe"

      - name: Copy supporting files
        run: |
          $pkgDir = "build\dist\PianoTrans"
          New-Item -ItemType Directory -Force "$pkgDir\reg"
          Copy-Item README.md "$pkgDir\README.txt"
          Copy-Item windows\PianoTrans-CPU.bat $pkgDir\
          Copy-Item windows\RightClickMenuRegister.bat $pkgDir\
          Copy-Item windows\RightClickMenuUnregister.bat $pkgDir\
          Copy-Item windows\RightClickMenuRegister.reg.in "$pkgDir\reg\"
          Copy-Item windows\RightClickMenuUnregister.reg "$pkgDir\reg\"

      - name: Verify package structure
        run: |
          Write-Host "=== Package contents ==="
          Get-ChildItem build\dist\PianoTrans\ -Recurse -Depth 2 |
            ForEach-Object { $_.FullName.Replace($pwd.Path + '\', '') }

      - name: Upload artifact
        if: ${{ inputs.upload_artifact != false }}
        uses: actions/upload-artifact@v4
        with:
          name: PianoTrans-Windows
          path: build\dist\PianoTrans\
          retention-days: 30
